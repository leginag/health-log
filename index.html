<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Health Challenge</title>
<meta name="description" content="Two-player daily health challenge — complete your quests, power up your character, keep each other honest. Data stays on your device.">
<meta name="theme-color" content="#12152b">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.webmanifest">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Health Challenge">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>
<title>Health Challenge</title>
<style>
  /* ── tokens — the app commits to a "training at dusk" dark look ─────── */
  :root {
    --bg: #0f1226;
    --surface: #1b1f3a;
    --surface-2: #242949;
    --sheet: #20244a;
    --ink: #eef0ff;
    --ink-2: #c0c4e2;
    --muted: #8d92b8;
    --hairline: rgba(238, 240, 255, .10);
    --track: #2b3054;
    --accent: #ff4a2d;
    --accent-strong: #ff8d76;
    --on-accent: #ffffff;
    --accent-tint: rgba(255, 74, 45, .16);
    --gold: #ffc44d;
    --gold-ink: #ffce6b;
    --gold-tint: rgba(255, 185, 46, .15);
    --p2: #24c9bb;
    --p2-strong: #5adfd4;
    --p2-tint: rgba(36, 201, 187, .16);
    --danger: #ff6a5e;
    --danger-tint: rgba(255, 106, 94, .14);
    --nav-bg: rgba(15, 18, 38, .88);
    --scrim: rgba(4, 6, 18, .6);
    --shadow: 0 1px 2px rgba(0, 0, 0, .25), 0 6px 20px rgba(0, 0, 0, .32);
    --font: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }

  /* ── base ────────────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; }
  html { background: var(--bg); }
  html.locked { overflow: hidden; }
  body {
    margin: 0;
    background: var(--bg);
    background-image: radial-gradient(1100px 500px at 50% -160px, rgba(255, 74, 45, .09), transparent 70%);
    background-repeat: no-repeat;
    color: var(--ink);
    font-family: var(--font);
    font-size: 16px;
    line-height: 1.45;
    -webkit-text-size-adjust: 100%;
    -webkit-tap-highlight-color: transparent;
  }
  button {
    font: inherit;
    color: inherit;
    background: none;
    border: 0;
    padding: 0;
    cursor: pointer;
    touch-action: manipulation;
  }
  button:disabled { cursor: default; }
  :focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; border-radius: 6px; }
  svg { display: block; }

  #app {
    max-width: 480px;
    margin: 0 auto;
    padding: 14px 14px calc(96px + env(safe-area-inset-bottom, 0px));
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--hairline);
    border-radius: 18px;
    box-shadow: var(--shadow);
  }
  .sub { font-size: 13px; color: var(--muted); }
  .h-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 22px 2px 8px;
  }
  .view-title {
    margin: 6px 2px 12px;
    font-size: 27px;
    font-weight: 900;
    font-style: italic;
    text-transform: uppercase;
    letter-spacing: -0.01em;
  }
  .num { font-variant-numeric: tabular-nums; }

  /* ── storage banner ──────────────────────────────────────────────────── */
  #banner {
    background: var(--gold-tint);
    color: var(--gold-ink);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13.5px;
    margin-bottom: 12px;
  }

  /* ── person switcher ─────────────────────────────────────────────────── */
  .seg {
    display: flex;
    gap: 3px;
    background: var(--surface-2);
    border: 1px solid var(--hairline);
    border-radius: 13px;
    padding: 3px;
    margin-bottom: 12px;
  }
  .seg button {
    flex: 1;
    min-height: 38px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 14px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    padding: 0 10px;
  }
  .seg button.on { background: var(--surface); color: var(--ink); box-shadow: var(--shadow); }
  .seg button.on.p1s { color: var(--accent-strong); }
  .seg button.on.p2s { color: var(--p2-strong); }

  /* ── date bar & chips ────────────────────────────────────────────────── */
  .datebar { display: flex; align-items: center; gap: 8px; margin: 4px 0 10px; }
  .datebar-t { flex: 1; text-align: center; min-width: 0; }
  .datebar h1 {
    margin: 0;
    font-size: 24px;
    font-weight: 900;
    font-style: italic;
    text-transform: uppercase;
    letter-spacing: -0.01em;
  }
  .nav-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    display: grid; place-items: center;
    color: var(--ink-2);
    background: var(--surface);
    border: 1px solid var(--hairline);
    flex: none;
  }
  .nav-btn:disabled { opacity: .32; }
  .chips-row { display: flex; justify-content: space-between; gap: 8px; margin: 0 0 10px; }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11.5px; font-weight: 800;
    letter-spacing: .05em;
    padding: 4px 10px;
    border-radius: 99px;
    white-space: nowrap;
  }
  .chip.rank { background: var(--gold-tint); color: var(--rc, var(--gold-ink)); }
  .chip.arc { background: var(--accent-tint); color: var(--accent-strong); }
  .chip.arc.dim { background: var(--surface-2); color: var(--muted); }

  /* ── character card ──────────────────────────────────────────────────── */
  .champ {
    position: relative;
    text-align: center;
    padding: 14px 14px 12px;
    margin-bottom: 12px;
    overflow: hidden;
    background:
      repeating-conic-gradient(from 0deg at 50% 40%, transparent 0deg 11deg, rgba(255, 255, 255, .03) 11deg 13deg),
      linear-gradient(180deg, var(--surface-2), var(--surface));
  }
  .champ.super { border-color: rgba(255, 196, 77, .55); }
  .champ svg { width: 128px; height: auto; margin: 0 auto; position: relative; }
  .aura {
    position: absolute; left: 50%; top: 66px;
    width: 150px; height: 150px;
    transform: translateX(-50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 74, 45, .34), rgba(255, 74, 45, .10) 55%, transparent 72%);
    animation: pulse 2.6s ease-in-out infinite;
    pointer-events: none;
  }
  .aura.gold {
    background: radial-gradient(circle, rgba(255, 196, 77, .5), rgba(255, 155, 46, .16) 58%, transparent 74%);
    animation-duration: 1.4s;
  }
  @keyframes pulse { 50% { transform: translateX(-50%) scale(1.09); opacity: .78; } }
  .spark {
    position: absolute;
    color: var(--gold);
    font-size: 15px;
    pointer-events: none;
    animation: floaty 1.8s ease-in-out infinite;
  }
  .spark.s1 { left: 22%; top: 30px; }
  .spark.s2 { right: 20%; top: 52px; animation-delay: .5s; }
  .spark.s3 { left: 30%; top: 96px; animation-delay: 1s; font-size: 12px; }
  @keyframes floaty { 50% { transform: translateY(-7px); opacity: .55; } }
  .bubble {
    position: absolute; top: 14px; right: 12px;
    max-width: 128px;
    background: #fff; color: #23264a;
    font-size: 11.5px; font-weight: 700;
    border-radius: 13px 13px 13px 3px;
    padding: 7px 10px;
    text-align: left;
    transform: rotate(2deg);
    box-shadow: var(--shadow);
  }
  .power {
    margin-top: 6px;
    font-size: 11px; font-weight: 800;
    letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted);
  }
  .power b { color: var(--gold-ink); font-size: 15px; letter-spacing: 0; }
  .power-bar { height: 8px; border-radius: 4px; background: var(--track); margin-top: 6px; overflow: hidden; }
  .power-bar i {
    display: block; height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    transition: width .45s cubic-bezier(.22, .9, .36, 1);
  }

  /* ── quest rows ──────────────────────────────────────────────────────── */
  .acts { display: flex; flex-direction: column; gap: 10px; }
  .act { display: flex; align-items: center; gap: 10px; padding: 12px 12px 12px 13px; }
  .act-ic {
    position: relative;
    width: 46px; height: 46px; flex: none;
    border-radius: 15px;
    background: var(--surface-2);
    display: grid; place-items: center;
    font-size: 24px;
  }
  .act.done { border-color: rgba(255, 196, 77, .45); }
  .act.done .act-ic { background: var(--gold-tint); }
  .badge {
    position: absolute; right: -4px; bottom: -4px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--gold); color: #201500;
    display: grid; place-items: center;
    border: 2px solid var(--surface);
  }
  .act-mid { flex: 1; min-width: 0; }
  .act-name {
    font-weight: 700; font-size: 15px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 7px;
  }
  .bar { height: 5px; border-radius: 3px; background: var(--track); overflow: hidden; }
  .bar i {
    display: block; height: 100%;
    background: var(--accent); border-radius: 3px;
    transition: width .35s cubic-bezier(.22, .9, .36, 1);
  }
  .act.done .bar i { background: var(--gold); }
  .bar i.p2f { background: var(--p2); }
  .act-count {
    font-variant-numeric: tabular-nums;
    font-size: 16px; font-weight: 800;
    color: var(--ink-2);
    min-width: 58px; text-align: right; flex: none;
    border-radius: 10px;
    padding: 8px 4px;
  }
  .act-count:active { background: var(--surface-2); }
  .act.done .act-count { color: var(--gold-ink); }
  .act-count .goal-sep { font-size: 12px; font-weight: 700; color: var(--muted); }
  .act-count.pop { animation: pop .4s cubic-bezier(.22, .9, .36, 1); }
  @keyframes pop { 45% { transform: scale(1.25); } }
  .btn-dec {
    width: 38px; height: 38px; flex: none;
    border-radius: 50%;
    border: 1.5px solid var(--hairline);
    color: var(--ink-2);
    display: grid; place-items: center;
  }
  .btn-dec:disabled { opacity: .3; }
  .btn-inc {
    width: 46px; height: 46px; flex: none;
    border-radius: 50%;
    background: var(--accent); color: var(--on-accent);
    display: grid; place-items: center;
    transition: transform .12s ease;
  }
  .btn-inc:active { transform: scale(.9); }
  .step-hint { font-size: 10.5px; color: var(--muted); text-align: center; margin-top: 2px; font-variant-numeric: tabular-nums; }

  .empty { padding: 28px 20px; text-align: center; }
  .empty p { color: var(--muted); margin: 0 0 16px; font-size: 14.5px; }

  /* ── compare ─────────────────────────────────────────────────────────── */
  .duo-head { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 2px 0 12px; }
  .duo-head svg { width: 44px; height: 44px; }
  .duo-name { font-size: 12px; font-weight: 800; letter-spacing: .05em; text-transform: uppercase; max-width: 92px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .duo-name.you { color: var(--accent-strong); }
  .duo-name.rio { color: var(--p2-strong); }
  .duo-rank { display: block; font-size: 10px; color: var(--muted); letter-spacing: .08em; }
  .vs {
    font-weight: 900; font-style: italic; font-size: 17px;
    color: var(--gold);
    transform: rotate(-8deg);
  }

  .cmp-card { padding: 13px 14px; margin-bottom: 10px; }
  .cmp-card h3 {
    margin: 0 0 10px;
    font-size: 10.5px; font-weight: 800;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted);
  }
  .wkbars { display: flex; align-items: flex-end; gap: 12px; height: 84px; padding: 0 2px; }
  .wkcol { flex: 1; display: flex; align-items: flex-end; gap: 4px; height: 100%; border-radius: 8px; padding: 0 3px; }
  .wkcol.sel { background: var(--surface-2); box-shadow: inset 0 0 0 1.5px var(--gold); }
  .wkcol i { flex: 1; border-radius: 3px 3px 1px 1px; min-height: 3px; }
  .wkcol i.b1 { background: var(--accent); }
  .wkcol i.b2 { background: var(--p2); }
  .wk-lab { display: flex; gap: 12px; padding: 6px 2px 0; }
  .wk-lab button { flex: 1; text-align: center; font-size: 10px; color: var(--muted); font-weight: 700; border-radius: 7px; padding: 3px 0; }
  .wk-lab button.sel { color: var(--gold-ink); background: var(--surface-2); }

  .trend-row {
    display: grid; grid-template-columns: 98px 1fr;
    gap: 8px; align-items: center;
    padding: 6px 0;
    border-top: 1px solid var(--hairline);
  }
  .trend-row:first-of-type { border-top: 0; }
  .trend-head { padding: 0 0 3px; border-top: 0 !important; }
  .cell-lab {
    text-align: center;
    font-size: 9px; font-weight: 700;
    color: var(--muted);
    white-space: nowrap; overflow: hidden;
  }
  .trend-name { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cells { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
  .cellpair { display: flex; flex-direction: column; gap: 2px; }
  .cell {
    height: 15px; border-radius: 4px;
    font-size: 9px; font-weight: 800;
    display: grid; place-items: center;
    color: rgba(255, 255, 255, .95);
    font-variant-numeric: tabular-nums;
  }
  .cell.miss { outline: 1.5px dashed var(--danger); outline-offset: -1.5px; }
  .y4 { background: rgba(255, 74, 45, .85); } .y3 { background: rgba(255, 74, 45, .55); }
  .y2 { background: rgba(255, 74, 45, .32); } .y1 { background: rgba(255, 74, 45, .15); }
  .r4 { background: rgba(36, 201, 187, .8); } .r3 { background: rgba(36, 201, 187, .5); }
  .r2 { background: rgba(36, 201, 187, .3); } .r1 { background: rgba(36, 201, 187, .14); }
  .cmp-legend { display: flex; gap: 12px; justify-content: center; font-size: 10.5px; color: var(--muted); font-weight: 700; padding-top: 9px; flex-wrap: wrap; }
  .cmp-legend i { display: inline-block; width: 9px; height: 9px; border-radius: 2.5px; margin-right: 4px; }

  .slip { border-color: rgba(255, 106, 94, .4); }
  .slip h3 { color: var(--accent-strong); }
  .slip p { font-size: 13px; color: var(--ink-2); margin: 0; }
  .slip p + p { margin-top: 6px; }
  .slip b { color: var(--gold-ink); }
  .slip.allgood { border-color: rgba(36, 201, 187, .4); }
  .slip.allgood h3 { color: var(--p2-strong); }

  .wkdet-head { display: flex; gap: 5px; margin-left: 106px; margin-bottom: 6px; }
  .wkdet-head span { width: 15px; text-align: center; font-size: 10px; font-weight: 700; color: var(--muted); }
  .wkdet-row { display: grid; grid-template-columns: 98px 1fr; gap: 8px; align-items: center; padding: 4px 0; }
  .dots { display: flex; gap: 5px; }
  .dot { width: 15px; height: 15px; border-radius: 50%; flex: none; }
  .dot-met { background: var(--accent); }
  .dot-none { border: 2px solid var(--track); }
  .dot-met.p2d { background: var(--p2); }
  .dot-fut { border: 2px dashed var(--track); opacity: .5; }
  .wkdet-hint { font-size: 12px; color: var(--muted); text-align: center; margin: 8px 4px 0; }
  .sync-note { font-size: 12.5px; color: var(--muted); margin: 10px 4px 0; line-height: 1.5; }

  /* ── crew ────────────────────────────────────────────────────────────── */
  .mrow {
    width: 100%;
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px;
    text-align: left;
  }
  .mrow-em {
    width: 42px; height: 42px; flex: none;
    border-radius: 13px; background: var(--surface-2);
    display: grid; place-items: center; font-size: 21px;
  }
  .mrow-mid { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
  .mrow-name { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mrow svg { color: var(--muted); flex: none; }
  .mrow .restore-tag { font-size: 12.5px; font-weight: 700; color: var(--p2-strong); flex: none; }
  .name-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .name-field { display: flex; flex-direction: column; gap: 5px; }
  .name-field label { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); padding-left: 2px; }
  .name-field .dotmark { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); margin-right: 5px; }
  .name-field.p2n .dotmark { background: var(--p2); }

  .ladder { padding: 8px 14px; }
  .ladder-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-top: 1px solid var(--hairline); }
  .ladder-row:first-child { border-top: 0; }
  .rl {
    width: 34px; height: 34px; flex: none;
    border-radius: 11px;
    display: grid; place-items: center;
    font-weight: 900; font-style: italic; font-size: 19px;
    background: var(--surface-2);
    color: var(--rc);
  }
  .ladder-row.me { background: linear-gradient(90deg, var(--gold-tint), transparent); border-radius: 10px; margin: 0 -8px; padding-left: 8px; padding-right: 8px; }
  .ladder-name { font-weight: 800; font-size: 13.5px; letter-spacing: .04em; text-transform: uppercase; flex: 1; }
  .ladder-req { font-size: 12px; color: var(--muted); text-align: right; }

  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    min-height: 48px;
    border-radius: 14px;
    font-weight: 700; font-size: 15px;
    padding: 0 16px;
  }
  .btn-primary { background: var(--accent); color: var(--on-accent); }
  .btn-surface { background: var(--surface); border: 1px solid var(--hairline); color: var(--ink-2); box-shadow: var(--shadow); }
  .btn-ghost { color: var(--ink-2); }
  .btn-danger { color: var(--danger); font-weight: 700; }
  .btn-danger.armed { background: var(--danger); color: #fff; border-radius: 14px; padding: 0 16px; }
  .btn-add { width: 100%; margin-top: 10px; }
  .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .f-err { color: var(--danger); font-size: 13px; margin: 6px 2px; }
  .f-ok { color: var(--p2-strong); font-size: 13px; margin: 6px 2px; }
  .f-warn { color: var(--gold-ink); background: var(--gold-tint); border-radius: 10px; padding: 8px 12px; font-size: 13px; margin: 8px 0; line-height: 1.5; }
  .addmiss { display: flex; gap: 9px; align-items: flex-start; font-size: 13.5px; color: var(--ink-2); margin: 10px 2px; line-height: 1.45; }
  .addmiss input { width: 18px; height: 18px; flex: none; margin: 1px 0 0; accent-color: var(--accent); }
  .note { font-size: 12.5px; color: var(--muted); margin: 10px 4px 0; line-height: 1.5; }
  .confirm-import { padding: 14px; margin-top: 10px; background: var(--surface); }
  .confirm-import p { margin: 0 0 12px; font-size: 14px; color: var(--ink-2); }
  .confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .erase-wrap { margin-top: 22px; display: flex; justify-content: center; }
  .erase-wrap .btn { min-height: 44px; font-size: 14px; }

  /* ── sheets ──────────────────────────────────────────────────────────── */
  .scrim {
    position: fixed; inset: 0;
    background: var(--scrim);
    animation: fade .25s ease;
    z-index: 40;
  }
  @keyframes fade { from { opacity: 0; } }
  .sheet {
    position: fixed; left: 50%; bottom: 0;
    transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--sheet);
    border-radius: 22px 22px 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0px));
    box-shadow: 0 -8px 40px rgba(0, 0, 0, .4);
    animation: rise .3s cubic-bezier(.22, .9, .36, 1);
    z-index: 50;
    max-height: 88vh; overflow-y: auto;
  }
  @keyframes rise { from { transform: translate(-50%, 30px); opacity: 0; } }
  .sheet h2 { margin: 0 0 4px; font-size: 19px; font-weight: 800; }
  .sheet .sheet-sub { margin: 0 0 12px; }
  .f-label {
    display: block;
    font-size: 11px; font-weight: 700;
    letter-spacing: .08em; text-transform: uppercase;
    color: var(--muted);
    margin: 16px 2px 7px;
  }
  .f-input, .paste-box {
    width: 100%;
    font: inherit; font-size: 16px;
    color: var(--ink);
    background: var(--surface-2);
    border: 1.5px solid var(--hairline);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .f-input:focus, .paste-box:focus { outline: none; border-color: var(--accent); }
  .f-input.num { font-weight: 800; font-variant-numeric: tabular-nums; }
  .num-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .paste-box { min-height: 104px; resize: vertical; font-size: 13px; word-break: break-all; }
  .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
  .em {
    aspect-ratio: 1;
    min-height: 44px;
    max-height: 54px;
    border-radius: 11px;
    font-size: 22px;
    display: grid; place-items: center;

    '<div class="aura' + (sup ? ' gold' : '') + '" style="opacity:' + (sup ? '1' : (0.2 + 0.7 * frac).toFixed(2)) + '" aria-hidden="true"></div>' +
    (sup ? '<span class="spark s1" aria-hidden="true">✦</span><span class="spark s2" aria-hidden="true">⚡</span><span class="spark s3" aria-hidden="true">✦</span>' : '') +
    charSVG(pid, sup, false) +
    (bt ? '<div class="bubble">' + bt + '</div>' : '') +
    '<div class="power">Power <b class="num">' + met + ' / ' + total + '</b></div>' +
    '<div class="power-bar"><i style="width:' + Math.round(frac * 100) + '%"></i></div>' +
    '</section>';
}

function segHTML() {
  return '<div class="seg" role="tablist" aria-label="Person">' + db.profiles.map(function (p, i) {
    return '<button role="tab" aria-selected="' + (view.person === p.id) + '" class="' + (view.person === p.id ? 'on ' + (i === 0 ? 'p1s' : 'p2s') : '') + '" data-act="person" data-id="' + p.id + '">' + esc(pname(p.id)) + '</button>';
  }).join('') + '</div>';
}

/* ── views ───────────────────────────────────────────────────────────── */
function vToday() {
  var k = view.date, t = todayKey(), acts = db.activities, pid = view.person;
  var rk = rankOf(pid), arc = arcStreak(pid);

  var h = '<header class="datebar">' +
    '<button class="nav-btn" data-act="prev" aria-label="Previous day">' + SVG_PREV + '</button>' +
    '<div class="datebar-t"><h1>' + relLabel(k) + '</h1><div class="sub">' + fmtDate(k) + '</div></div>' +
    '<button class="nav-btn" data-act="next" ' + (k === t ? 'disabled' : '') + ' aria-label="Next day">' + SVG_NEXT + '</button>' +
    '</header>';

  h += segHTML();

  h += '<div class="chips-row">' +
    '<button class="chip rank" style="--rc:' + rk.c + '" data-act="rank-info" aria-label="Rank ' + rk.l + ', ' + rk.n + ' — tap to see how ranks work">★ ' + rk.l + ' · ' + rk.n + '</button>' +
    (arc > 0
      ? '<button class="chip arc" data-act="arc-info" aria-label="Day ' + arc + ' of the arc — tap to see how arcs work">🔥 Day ' + arc + (arc === 1 ? ' — arc begins' : ' of the arc') + '</button>'
      : '<button class="chip arc dim" data-act="arc-info" aria-label="No arc running — tap to see how arcs work">Start a new arc today</button>') +
    '</div>';

  if (!acts.length) {
    return h + '<div class="card empty"><p>No quests yet.<br>Add what you two are training.</p>' +
      '<button class="btn btn-primary" data-act="add" style="margin:0 auto">' + SVG_PLUS + ' Add a quest</button></div>';
  }

  h += champHTML(pid, k);

  h += '<div class="acts">' + acts.map(function (a) {
    var c = countOf(pid, k, a.id);
    var done = c >= a.goal;
    var pct = Math.min(100, Math.round(c / a.goal * 100));
    var unit = a.unit ? ' ' + a.unit : '';
    return '<div class="act card' + (done ? ' done' : '') + '">' +
      '<div class="act-ic">' + a.emoji + (done ? '<span class="badge">' + SVG_CHECK + '</span>' : '') + '</div>' +
      '<div class="act-mid"><div class="act-name">' + esc(a.name) + '</div>' +
      '<div class="bar"><i style="width:' + pct + '%"></i></div></div>' +
      '<button class="act-count' + (view.pop === a.id ? ' pop' : '') + '" data-act="set" data-id="' + a.id + '" aria-label="Type exact total for ' + esc(a.name) + (a.unit ? ' in ' + a.unit : '') + '">' + fmtN(c) + '<span class="goal-sep">/' + fmtN(a.goal) + '</span></button>' +
      '<div>' +
      '<button class="btn-dec" data-act="dec" data-id="' + a.id + '" ' + (c === 0 ? 'disabled' : '') + ' aria-label="Remove ' + a.step + ' from ' + esc(a.name) + '">' + SVG_MINUS + '</button>' +
      '</div>' +
      '<div>' +
      '<button class="btn-inc" data-act="inc" data-id="' + a.id + '" aria-label="Add ' + a.step + ' to ' + esc(a.name) + '">' + SVG_PLUS + '</button>' +
      (a.step > 1 ? '<div class="step-hint">+' + fmtN(a.step) + unit + '</div>' : '') +
      '</div>' +
      '</div>';
  }).join('') + '</div>';

  h += '<p class="note" style="text-align:center">Tap the number to type an exact total.</p>';

  return h;
}

function vCompare() {
  var t = todayKey(), acts = db.activities;
  var n1 = pname('p1'), n2 = pname('p2');
  var h = '<h1 class="view-title">Compare</h1>';

  if (!acts.length) {
    return h + '<div class="card empty"><p>Add quests first — then you can<br>check in on each other here.</p></div>';
  }

  var weeks = lastWeeks(4);
  if (!view.cmpWeek || weeks.indexOf(view.cmpWeek) < 0) view.cmpWeek = weeks[weeks.length - 1];
  var r1 = rankOf('p1'), r2 = rankOf('p2');

  h += '<div class="duo-head">' +
    charSVG('p1', rankIndex(r1) === 4, true) +
    '<span class="duo-name you">' + esc(n1) + '<span class="duo-rank">★ ' + r1.l + '-Rank</span></span>' +
    '<span class="vs">VS</span>' +
    '<span class="duo-name rio" style="text-align:right">' + esc(n2) + '<span class="duo-rank">★ ' + r2.l + '-Rank</span></span>' +
    charSVG('p2', rankIndex(r2) === 4, true) +
    '</div>';

  // momentum: paired weekly bars, % of possible quest-days
  function weekPct(pid, ws) {
    var poss = weekElapsed(ws) * acts.length;
    return poss ? weekMet(pid, ws) / poss : 0;
  }
  h += '<div class="cmp-card card"><h3>Quests completed · last 4 weeks</h3>' +
    '<div class="wkbars">' + weeks.map(function (ws) {
      var f1 = weekPct('p1', ws), f2 = weekPct('p2', ws);
      return '<button class="wkcol' + (ws === view.cmpWeek ? ' sel' : '') + '" data-act="cmp-week" data-date="' + ws + '"' +
        ' aria-label="Week of ' + fmtShort(ws) + ': ' + esc(n1) + ' ' + Math.round(f1 * 100) + '%, ' + esc(n2) + ' ' + Math.round(f2 * 100) + '% — tap for the day-by-day">' +
        '<i class="b1" style="height:' + Math.max(3, Math.round(f1 * 100)) + '%"></i>' +
        '<i class="b2" style="height:' + Math.max(3, Math.round(f2 * 100)) + '%"></i>' +
        '</button>';
    }).join('') + '</div>' +
    '<div class="wk-lab">' + weeks.map(function (ws) {
      var lab = weekComplete(ws) ? fmtShort(ws) : 'This wk';
      return '<button class="' + (ws === view.cmpWeek ? 'sel' : '') + '" data-act="cmp-week" data-date="' + ws + '">' + lab + '</button>';
    }).join('') + '</div></div>';

  // per-quest weekly grid: days hit per week, weak weeks flagged
  function cellCls(n, who, flagged) {
    var lv = n >= 6 ? 4 : n >= 4 ? 3 : n >= 2 ? 2 : 1;
    return (who === 'p1' ? 'y' : 'r') + lv + (flagged ? ' miss' : '');
  }
  h += '<div class="cmp-card card"><h3>By quest · days hit per week</h3>';
  h += '<div class="trend-row trend-head"><div></div><div class="cells">' +
    weeks.map(function (ws) {
      return '<span class="cell-lab">' + (weekComplete(ws) ? fmtShort(ws) : 'This wk') + '</span>';
    }).join('') + '</div></div>';
  h += acts.map(function (a) {
    return '<div class="trend-row"><div class="trend-name">' + a.emoji + ' ' + esc(a.name) + '</div>' +
      '<div class="cells">' + weeks.map(function (ws) {
        var d1 = daysHit('p1', ws, a), d2 = daysHit('p2', ws, a);
        var done = weekComplete(ws);
        return '<div class="cellpair">' +
          '<div class="cell ' + cellCls(d1, 'p1', done && d1 < 4) + '" title="' + esc(n1) + ' · ' + esc(a.name) + ' · wk of ' + fmtShort(ws) + ': ' + d1 + ' days">' + d1 + '</div>' +
          '<div class="cell ' + cellCls(d2, 'p2', done && d2 < 4) + '" title="' + esc(n2) + ' · ' + esc(a.name) + ' · wk of ' + fmtShort(ws) + ': ' + d2 + ' days">' + d2 + '</div>' +
          '</div>';
      }).join('') + '</div></div>';
  }).join('');
  h += '<div class="cmp-legend">' +
    '<span><i style="background:var(--accent)"></i>' + esc(n1) + '</span>' +
    '<span><i style="background:var(--p2)"></i>' + esc(n2) + '</span>' +
    '<span><i style="outline:1.5px dashed var(--danger);outline-offset:-1.5px"></i>weak week (&lt;4 days)</span>' +
    '</div></div>';

  // weak spots — the app names where you're slipping
  var msgs = [];
  var doneWeeks = weeks.filter(weekComplete);
  if (doneWeeks.length >= 2) {
    acts.forEach(function (a) {
      var f1 = 0, f2 = 0;
      doneWeeks.forEach(function (ws) {
        if (daysHit('p1', ws, a) < 4) f1++;
        if (daysHit('p2', ws, a) < 4) f2++;
      });
      var most = Math.ceil(doneWeeks.length / 2);
      if (f1 > most - 1 && f2 > most - 1) {
        msgs.push('<b>' + a.emoji + ' ' + esc(a.name) + '</b> is the shared weak spot — you both landed under 4 days in ' +
          Math.max(f1, f2) + ' of the last ' + doneWeeks.length + ' weeks.');
      } else if (f1 > most - 1) {
        msgs.push('<b>' + esc(n1) + '</b> keeps slipping on <b>' + a.emoji + ' ' + esc(a.name) + '</b> — ' + f1 + ' weak week' + (f1 === 1 ? '' : 's') + ' of ' + doneWeeks.length + '.');
      } else if (f2 > most - 1) {
        msgs.push('<b>' + esc(n2) + '</b> keeps slipping on <b>' + a.emoji + ' ' + esc(a.name) + '</b> — ' + f2 + ' weak week' + (f2 === 1 ? '' : 's') + ' of ' + doneWeeks.length + '.');
      }
    });
  }
  if (msgs.length) {
    h += '<div class="cmp-card card slip"><h3>⚠ Weak spots</h3>' +
      msgs.slice(0, 3).map(function (m) { return '<p>' + m + '</p>'; }).join('') + '</div>';
  } else if (doneWeeks.length >= 2) {
    h += '<div class="cmp-card card slip allgood"><h3>✓ No weak spots</h3>' +
      '<p>Nothing under 4 days a week lately — you\'re both holding the line. 💪</p></div>';
  }

  // selected week, day by day
  var ws = view.cmpWeek;
  var head = '<div class="wkdet-head">';
  for (var i = 0; i < 7; i++) head += '<span>' + parseKey(addDays(ws, i)).toLocaleDateString(undefined, { weekday: 'narrow' }) + '</span>';
  head += '</div>';
  function detRow(pid, dotCls) {
    var r = '';
    for (var i = 0; i < 7; i++) {
      var k = addDays(ws, i);
      if (k > t) { r += '<span class="dot dot-fut"></span>'; continue; }
      var m = metCount(pid, k);
      var cls = m > 0 ? 'dot-met ' + dotCls : 'dot-none';
      r += '<button class="dot ' + cls + '" data-act="jump" data-date="' + k + '" data-id="' + pid + '"' +
        ' aria-label="' + esc(pname(pid)) + ' · ' + fmtDate(k) + ': ' + m + ' of ' + db.activities.length + ' quests — tap to open that day"></button>';
    }
    return r;
  }
  h += '<div class="cmp-card card"><h3>Week of ' + fmtShort(ws) + ' · day by day</h3>' + head;
  h += acts.map(function (a) {
    function qRow(pid, dotCls) {
      var r = '';
      for (var i = 0; i < 7; i++) {
        var k = addDays(ws, i);
        if (k > t) { r += '<span class="dot dot-fut"></span>'; continue; }
        var met = countOf(pid, k, a.id) >= a.goal;
        r += met
          ? '<button class="dot dot-met ' + dotCls + '" data-act="jump" data-date="' + k + '" data-id="' + pid + '" aria-label="' + esc(pname(pid)) + ' · ' + esc(a.name) + ' · ' + fmtDate(k) + ': done — tap to open"></button>'
          : '<button class="dot dot-none" data-act="jump" data-date="' + k + '" data-id="' + pid + '" aria-label="' + esc(pname(pid)) + ' · ' + esc(a.name) + ' · ' + fmtDate(k) + ': missed — tap to open"></button>';
      }
      return r;
    }
    return '<div class="wkdet-row"><div class="trend-name">' + a.emoji + ' ' + esc(a.name) + '</div>' +
      '<div><div class="dots">' + qRow('p1', '') + '</div>' +
      '<div class="dots" style="margin-top:4px">' + qRow('p2', 'p2d') + '</div></div></div>';
  }).join('');
  h += '<p class="wkdet-hint">Top row ' + esc(n1) + ', bottom ' + esc(n2) + ' — tap a dot to open that day.</p></div>';

  // sync
  h += '<div class="h-label">Different phones? Stay in sync</div>' +
    '<div class="data-grid">' +
    '<button class="btn btn-surface" data-act="share-code">Share my update</button>' +
    '<button class="btn btn-surface" data-act="paste-code">Add partner\'s update</button>' +
    '</div>';
  if (view.syncMsg) h += '<div class="f-ok">' + esc(view.syncMsg) + '</div>';
  h += '<p class="sync-note">Each phone keeps its own log, and mix-ups can\'t happen by design: <strong>Share my update</strong> always carries <em>your</em> column (' + esc(n1) + ') no matter which view you\'re on, pasting a code only ever fills the <em>' + esc(n2) + '</em> column — never yours — and this phone\'s own codes won\'t import back into it. Before anything is saved you\'ll see who the code is from and how many days it changes.</p>';

  return h;
}

function vCrew() {
  var h = '<h1 class="view-title">Crew</h1>';

  h += '<div class="h-label">Who\'s challenging</div><div class="name-grid">' +
    db.profiles.map(function (p, i) {
      return '<div class="name-field' + (i === 1 ? ' p2n' : '') + '"><label for="pn-' + p.id + '"><span class="dotmark"></span>' + (i === 1 ? 'Your rival' : 'You') + '</label>' +
        '<input class="f-input" id="pn-' + p.id + '" data-role="pname" data-id="' + p.id + '" maxlength="18" value="' + esc(p.name) + '" placeholder="' + (i === 1 ? 'Partner' : 'Me') + '" autocomplete="off"></div>';
    }).join('') + '</div>' +
    '<button class="btn btn-surface btn-add" data-act="swap-people">⇅ Swap the two people</button>' +
    '<p class="note">The “You” column belongs to whoever holds this device — shared codes always carry it. If names and history ever end up on the wrong side, swap flips them back (tap again to undo).</p>';

  h += '<div class="h-label">Quests</div><div class="acts">' +
    db.activities.map(function (a) {
      return '<button class="mrow card" data-act="edit" data-id="' + a.id + '">' +
        '<span class="mrow-em">' + a.emoji + '</span>' +
        '<span class="mrow-mid"><span class="mrow-name">' + esc(a.name) + '</span>' +
        '<span class="sub">Goal ' + fmtN(a.goal) + (a.unit ? ' ' + a.unit : '') + (a.step > 1 ? ' · tap adds ' + fmtN(a.step) : '') + '</span></span>' +
        SVG_PEN + '</button>';
    }).join('') + '</div>';

  h += '<button class="btn btn-primary btn-add" data-act="add">' + SVG_PLUS + ' Add a quest</button>';

  var rk = rankOf('p1');
  h += '<div class="h-label">The rank ladder</div><div class="ladder card">' +
    RANKS.map(function (r) {
      return '<div class="ladder-row' + (r === rk ? ' me' : '') + '" style="--rc:' + r.c + '">' +
        '<span class="rl">' + r.l + '</span>' +
        '<span class="ladder-name">' + r.n + (r === rk ? ' · you' : '') + '</span>' +
        '<span class="ladder-req">' + r.req + '</span></div>';
    }).join('') + '</div>' +
    '<p class="note">Ranks follow your last 4 weeks of quests, so they rise with consistency — and slide back when an arc breaks.</p>';

  if (db.archived && db.archived.length) {
    h += '<div class="h-label">Retired quests</div><div class="acts">' +
      db.archived.map(function (a) {
        return '<button class="mrow card" data-act="restore-quest" data-id="' + a.id + '">' +
          '<span class="mrow-em">' + a.emoji + '</span>' +
          '<span class="mrow-mid"><span class="mrow-name">' + esc(a.name) + '</span>' +
          '<span class="sub">History kept — tap to bring it back</span></span>' +
          '<span class="restore-tag">Restore</span></button>';
      }).join('') + '</div>';
  }

  h += '<div class="h-label">Your data</div><div class="data-grid">' +
    '<button class="btn btn-surface" data-act="export-json">Download backup</button>' +
    '<button class="btn btn-surface" data-act="export-csv">Export CSV</button>' +
    '<button class="btn btn-surface" data-act="pick-import" style="grid-column:1/-1">Restore from backup</button>' +
    '</div>';

  if (view.importErr) h += '<div class="f-err">' + esc(view.importErr) + '</div>';

  if (view.pendingImport) {
    var p = view.pendingImport;
    var dayCount = Object.keys(p.logs.p1).length + Object.keys(p.logs.p2).length;
    h += '<div class="card confirm-import">' +
      '<p>This backup has <strong>' + p.activities.length + '</strong> activities and <strong>' +
      dayCount + '</strong> logged days. Restoring replaces everything currently here.</p>' +
      '<div class="confirm-actions">' +
      '<button class="btn btn-ghost" data-act="cancel-import">Cancel</button>' +
      '<button class="btn btn-primary" data-act="confirm-import">Restore</button>' +
      '</div></div>';
  }

  h += '<p class="note">Logs live in this browser on this device — they\'re never sent anywhere. ' +
    'Download a backup now and then, or to move to a new phone.</p>';

  h += '<div class="erase-wrap"><button class="btn btn-danger' + (view.confirmErase ? ' armed' : '') + '" data-act="erase">' +
    (view.confirmErase ? 'Tap again to erase everything' : 'Erase all data') + '</button></div>';

  return h;
}

/* ── sheets ──────────────────────────────────────────────────────────── */

  var inner = '';

      '<label class="f-label" for="f-name">Name</label>' +
      '<input class="f-input" id="f-name" maxlength="24" value="' + esc(s.name) + '" placeholder="e.g. Stretching" autocomplete="off">' +
      (s.err ? '<div class="f-err">' + esc(s.err) + '</div>' : '') +
      '<div class="f-label">Icon</div>' +
      '<div class="emoji-grid">' + EMOJI.map(function (x) {
        return '<button class="em' + (x === s.emoji ? ' sel' : '') + '" data-act="emoji" data-v="' + x + '" aria-label="Icon ' + x + '">' + x + '</button>';
      }).join('') + '</div>' +
      '<div class="num-grid"><div>' +
      '<label class="f-label" for="f-goal">Daily goal</label>' +
      '<input class="f-input num" id="f-goal" inputmode="numeric" pattern="[0-9]*" maxlength="6" value="' + s.goal + '" autocomplete="off">' +
      '</div><div>' +
      '<label class="f-label" for="f-step">Each tap adds</label>' +
      '<input class="f-input num" id="f-step" inputmode="numeric" pattern="[0-9]*" maxlength="5" value="' + s.step + '" autocomplete="off">' +
      '</div></div>' +
      '<p class="note">e.g. Push-ups: goal 50, tap adds 10 · Stretching: goal 10 minutes, tap adds 5.</p>' +
      '<div class="sheet-actions">' +
      (s.id ? '<button class="btn btn-danger' + (s.confirmDelete ? ' armed' : '') + '" data-act="del">' +
        (s.confirmDelete ? 'Tap again — history goes too' : 'Delete') + '</button>' : '') +
      '<span class="spacer"></span>' +
      '<button class="btn btn-ghost" data-act="close-sheet">Cancel</button>' +
      '<button class="btn btn-primary" data-act="save-edit">Save</button>' +
      '</div>';
  }

  if (s.type === 'ranks') {
    var rkMe = rankOf(view.person);
    inner = '<h2>★ The rank ladder</h2>' +
      '<p class="sub sheet-sub">' + esc(pname(view.person)) + ' is <strong>' + rkMe.l + ' · ' + rkMe.n + '</strong> right now.</p>' +
      '<div class="ladder card">' +
      RANKS.map(function (r) {
        return '<div class="ladder-row' + (r === rkMe ? ' me' : '') + '" style="--rc:' + r.c + '">' +
          '<span class="rl">' + r.l + '</span>' +
          '<span class="ladder-name">' + r.n + (r === rkMe ? ' · ' + esc(pname(view.person)) : '') + '</span>' +
          '<span class="ladder-req">' + r.req + '</span></div>';
      }).join('') + '</div>' +
      '<p class="note">Your rank looks at the last 4 weeks: every quest completed on a day counts, out of everything you could have completed. Hit half of them and you\'re a Challenger; keep climbing from there. S-Legend is different — it takes 21 perfect days in a row (every quest, every day).</p>' +
      '<p class="note">Ranks aren\'t permanent: ease off for a couple of weeks and you\'ll slide back down the ladder. That\'s the challenge.</p>' +
      '<div class="sheet-actions"><span class="spacer"></span>' +
      '<button class="btn btn-primary" data-act="close-sheet">Got it</button></div>';
  }

  if (s.type === 'arc') {
    var arcN = arcStreak(view.person);
    inner = '<h2>🔥 Training arcs</h2>' +
      '<p class="sub sheet-sub">' + esc(pname(view.person)) + (arcN > 0
        ? ' is on <strong>day ' + arcN + '</strong> of the current arc.'
        : ' has no arc running — today can be day 1.') + '</p>' +
      '<p class="note" style="margin-top:0">An arc is your streak: <strong>consecutive days where you completed at least one quest</strong>. Any quest keeps it alive — it doesn\'t have to be a perfect day.</p>' +
      '<p class="note">A day with nothing completed ends the arc. Today gets grace, though: the arc only counts as broken once the day is over, so you have until midnight to keep it going.</p>' +
      '<p class="note">“Start a new arc” just means no streak is running right now — complete any quest today and you\'re back on day 1. Long arcs are how ranks climb, and 21 perfect days in a row is the road to S-Legend.</p>' +
      '<div class="sheet-actions"><span class="spacer"></span>' +
      '<button class="btn btn-primary" data-act="close-sheet">Got it</button></div>';
  }

  if (s.type === 'set') {
    var a = byId(s.actId);
    if (!a) return '';
    inner = '<h2>' + a.emoji + ' ' + esc(a.name) + '</h2>' +
      '<p class="sub sheet-sub">' + esc(pname(view.person)) + ' · ' + relLabel(view.date).toLowerCase() + ' · goal ' + fmtN(a.goal) + (a.unit ? ' ' + a.unit : '') + '</p>' +
      '<label class="f-label" for="f-total">Total so far' + (a.unit ? ' (' + a.unit + ')' : '') + '</label>' +
      '<input class="f-input num" id="f-total" inputmode="numeric" pattern="[0-9]*" maxlength="6" value="' + countOf(view.person, view.date, a.id) + '" autocomplete="off">' +
      (s.err ? '<div class="f-err">' + esc(s.err) + '</div>' : '') +
      '<div class="sheet-actions">' +
      '<span class="spacer"></span>' +
      '<button class="btn btn-ghost" data-act="close-sheet">Cancel</button>' +
      '<button class="btn btn-primary" data-act="save-total">Save</button>' +
      '</div>';
  }

  if (s.type === 'share') {
    inner = '<h2>Share my update</h2>' +
      '<p class="sub sheet-sub"><strong>' + esc(pname('p1')) + '</strong>\'s last 14 days, as a code — sharing always sends this phone\'s own column, whichever view you\'re on. Send it to your rival any way you like.</p>' +
      '<textarea class="paste-box" id="f-code" readonly rows="4">' + esc(s.code) + '</textarea>' +
      '<div class="sheet-actions">' +
      '<span class="spacer"></span>' +
      '<button class="btn btn-ghost" data-act="close-sheet">Done</button>' +
      '<button class="btn btn-surface" data-act="copy-code">Copy</button>' +
      (navigator.share ? '<button class="btn btn-primary" data-act="native-share">Share…</button>' : '') +
      '</div>';
  }

  if (s.type === 'paste' && s.stage === 'ready') {
    var pr = s.parsed;
    inner = '<h2>Add partner\'s update</h2>' +
      '<p class="sub sheet-sub">From <strong>' + esc(pr.sender || 'unnamed') + '</strong> — ' +
      pr.days + ' day' + (pr.days === 1 ? '' : 's') + ', ' + pr.entries + ' entr' + (pr.entries === 1 ? 'y' : 'ies') + '. ' +
      'This fills those days in the <strong>' + esc(pname('p2')) + '</strong> column. Your own column isn\'t touched.</p>' +
      (pr.nameWarn ? '<div class="f-err">Heads up — this code says it\'s from “' + esc(pr.sender) + '”, but your partner column is named “' + esc(pname('p2')) + '”. Make sure it\'s the right person.</div>' : '') +
      (pr.goalDiffs.length ? '<div class="f-warn">You two have different goals — ' +
        pr.goalDiffs.map(function (g) { return esc(g.name) + ': theirs ' + fmtN(g.theirs) + ', yours ' + fmtN(g.mine); }).join(' · ') +
        '. Worth agreeing on one number and setting it in Crew on both phones.</div>' : '') +
      (pr.addable.length ? '<label class="addmiss"><input type="checkbox" id="f-addmissing" checked>' +
        '<span>They track something this phone doesn\'t: <strong>' + esc(pr.addableNames.join(', ')) + '</strong>. ' +
        'Add here too, so their ' + pr.addableEntries + ' entr' + (pr.addableEntries === 1 ? 'y' : 'ies') + ' come in.</span></label>' : '') +
      (pr.unknown.length ? '<div class="f-err">No matching quest here for: ' + esc(pr.unknown.join(', ')) + ' — those get skipped. (Names must match on both phones.)</div>' : '') +
      (pr.days === 0 && !pr.addable.length ? '<div class="f-err">Nothing in this code matches your quests, so there\'s nothing to add.</div>' : '') +
      '<div class="sheet-actions">' +
      '<button class="btn btn-ghost" data-act="paste-code">Back</button>' +
      '<span class="spacer"></span>' +
      '<button class="btn btn-ghost" data-act="close-sheet">Cancel</button>' +
      (pr.days > 0 || pr.addable.length ? '<button class="btn btn-primary" data-act="commit-code">Add it</button>' : '') +
      '</div>';
  } else if (s.type === 'paste') {
    inner = '<h2>Add partner\'s update</h2>' +
      '<p class="sub sheet-sub">Paste the code they sent you. You\'ll see who it\'s from and what it changes before anything is saved.</p>' +
      '<textarea class="paste-box" id="f-paste" rows="4" placeholder="HL1.…"></textarea>' +
      (s.err ? '<div class="f-err">' + esc(s.err) + '</div>' : '') +
      '<div class="sheet-actions">' +
      '<span class="spacer"></span>' +
      '<button class="btn btn-ghost" data-act="close-sheet">Cancel</button>' +
      '<button class="btn btn-primary" data-act="check-code">Check code</button>' +
      '</div>';
  }

  return '<div class="scrim" data-act="close-sheet"></div>' +
    '<div class="sheet" role="dialog" aria-modal="true">' + inner + '</div>';
}

/* ── render ──────────────────────────────────────────────────────────── */
function render() {
  renderedToday = todayKey();
  document.getElementById('view').innerHTML =
    view.tab === 'today' ? vToday() :
    view.tab === 'compare' ? vCompare() : vCrew();
  document.getElementById('sheet-root').innerHTML = vSheet();
  document.documentElement.classList.toggle('locked', !!view.sheet);
  var tabs = document.querySelectorAll('#tabbar [data-tab]');
  for (var i = 0; i < tabs.length; i++) {
    var on = tabs[i].dataset.tab === view.tab;
    tabs[i].classList.toggle('active', on);
    if (on) tabs[i].setAttribute('aria-current', 'page');
    else tabs[i].removeAttribute('aria-current');
  }
  document.getElementById('banner').hidden = storageOK;
}

function focusEl(idName, selectAll) {
  var i = document.getElementById(idName);
  if (i) { i.focus(); if (selectAll) i.select(); }
}
function syncEditorInputs() {
  var s = view.sheet;
  if (!s || s.type !== 'editor') return;
  var n = document.getElementById('f-name');
  var g = document.getElementById('f-goal');
  var st = document.getElementById('f-step');
  if (n) s.name = n.value;
  if (g) s.goal = g.value;
  if (st) s.step = st.value;
}

/* ── toast ───────────────────────────────────────────────────────────── */
var toastTimer = null;
function toast(msg) {
  var old = document.getElementById('toast');
  if (old) old.remove();
  var t = document.createElement('div');
  t.id = 'toast';
  t.setAttribute('role', 'status');
  t.textContent = msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { t.remove(); }, 2400);
}

/* ── import / export ─────────────────────────────────────────────────── */
function download(name, text, type) {
  var a = document.createElement('a');
  var url = URL.createObjectURL(new Blob([text], { type: type }));
  a.href = url;
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(function () { URL.revokeObjectURL(url); a.remove(); }, 800);
}

function exportJSON() {
  download('health-challenge-backup-' + todayKey() + '.json',
    JSON.stringify({ app: 'health-log', version: 2, rev: db.rev, exported: todayKey(), activities: db.activities, archived: db.archived, profiles: db.profiles, logs: db.logs, created: db.created }, null, 2),
    'application/json');
  toast('Backup downloaded');
}

function exportCSV() {
  var rows = [['date', 'person', 'activity', 'emoji', 'count', 'goal', 'met']];
  var map = {};
  db.activities.concat(db.archived || []).forEach(function (a) { map[a.id] = a; });
  db.profiles.forEach(function (p) {
    var logs = plogs(p.id);
    Object.keys(logs).sort().forEach(function (dk) {
      var day = logs[dk];
      for (var id in day) {
        var a = map[id];
        if (!a) continue;
        rows.push([dk, pname(p.id), a.name, a.emoji, day[id], a.goal, day[id] >= a.goal ? 'yes' : 'no']);
      }
    });
  });
  var csv = rows.map(function (r) {
    return r.map(function (v) {
      v = String(v);
      return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
    }).join(',');
  }).join('\n');
  download('health-challenge-' + todayKey() + '.csv', csv, 'text/csv');
  toast('CSV exported');
}

function cleanActs(list) {
  return list.map(function (a) {
    var out = {
      id: String(a && a.id ? a.id : uid()),
      name: String(a && a.name ? a.name : 'Activity').slice(0, 24),
      emoji: String(a && a.emoji ? a.emoji : '✅').slice(0, 8),
      goal: clampInt(a && a.goal, 1, 999999, 1),
      step: clampInt(a && a.step, 1, 99999, 1)
    };
    if (a && a.unit) out.unit = String(a.unit).slice(0, 8);
    return out;
  });
}

function cleanLogs(src, ids) {
  var logs = {};
  if (!src || typeof src !== 'object') return logs;
  Object.keys(src).forEach(function (dk) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(dk)) return;
    var day = src[dk];
    if (!day || typeof day !== 'object') return;
    var out = {};
    Object.keys(day).forEach(function (id) {
      if (!ids[id]) return;
      var n = clampInt(day[id], 0, 999999, 0);
      if (n > 0) out[id] = n;
    });
    if (Object.keys(out).length) logs[dk] = out;
  });
  return logs;
}

function normalizeImport(obj) {
  if (!obj || typeof obj !== 'object') throw new Error('bad');
  var src = Array.isArray(obj.activities) ? obj : (obj.data && Array.isArray(obj.data.activities) ? obj.data : null);
  if (!src || typeof src.logs !== 'object' || !src.logs) throw new Error('bad');
  var acts = cleanActs(src.activities);
  var archived = Array.isArray(src.archived) ? cleanActs(src.archived) : [];
  var ids = {};
  acts.concat(archived).forEach(function (a) { ids[a.id] = true; });
  var profiles = [{ id: 'p1', name: 'Me' }, { id: 'p2', name: 'Partner' }];
  if (Array.isArray(src.profiles)) {
    src.profiles.forEach(function (p, i) {
      if (i < 2 && p && p.name) profiles[i].name = String(p.name).slice(0, 18);
    });
  }
  var logs;
  if (src.logs.p1 || src.logs.p2) {
    logs = { p1: cleanLogs(src.logs.p1, ids), p2: cleanLogs(src.logs.p2, ids) };
  } else {
    logs = { p1: cleanLogs(src.logs, ids), p2: {} }; // v1 backup
  }
  return { activities: acts, archived: archived, rev: clampInt(src.rev, 0, 99, 0), profiles: profiles, logs: logs, created: typeof src.created === 'string' ? src.created : todayKey() };
}

/* ── partner share codes ─────────────────────────────────────────────── */
function buildShareCode() {
  // Codes ALWAYS carry this phone's own column (person A), never the imported
  // partner copy — so data can't ping-pong between phones or get mislabeled.
  var t = todayKey();
  var days = {}, meta = {};
  for (var i = 0; i < 14; i++) {
    var k = addDays(t, -i);
    var day = plogs('p1')[k];
    if (!day) continue;
    var o = {};
    db.activities.forEach(function (a) {
      var c = day[a.id];
      if (c > 0) {
        var nm = normName(a.name);
        o[nm] = c;
        meta[nm] = [a.emoji, a.goal, a.step, a.name]; // lets the other phone recreate it
      }
    });
    if (Object.keys(o).length) days[k] = o;
  }
  return 'HL1.' + b64e(JSON.stringify({ v: 1, n: pname('p1'), f: db.device, d: days, a: meta }));
}

function parseShareCode(text) {
  var m = String(text).match(/HL1\.([A-Za-z0-9+\/=]+)/);
  if (!m) throw new Error('That doesn\'t look like a Health Challenge code.');
  var p;
  try { p = JSON.parse(b64d(m[1])); } catch (e) { throw new Error('That code is damaged — ask them to share it again.'); }
  if (!p || typeof p.d !== 'object' || !p.d) throw new Error('That code is damaged — ask them to share it again.');
  if (p.f && p.f === db.device) throw new Error('That\'s this phone\'s own code — send it to your partner, and paste the one they send back.');
  var nameMap = {};
  db.activities.forEach(function (a) { nameMap[normName(a.name)] = a.id; });
  var days = 0, entries = 0, missed = {}, missedEntries = {};
  Object.keys(p.d).forEach(function (dk) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(dk)) return;
    var srcDay = p.d[dk];
    if (!srcDay || typeof srcDay !== 'object') return;
    var any = false;
    Object.keys(srcDay).forEach(function (nm) {
      var key = normName(nm);
      if (nameMap[key]) { entries++; any = true; }
      else { missed[nm] = 1; missedEntries[nm] = (missedEntries[nm] || 0) + 1; }
    });
    if (any) days++;
  });
  // split unmatched into "addable" (code carries the activity's details) vs unknown
  var addable = [], unknown = [], addableEntries = 0;
  Object.keys(missed).forEach(function (nm) {
    if (p.a && p.a[nm]) { addable.push(nm); addableEntries += missedEntries[nm]; }
    else { unknown.push(nm); }
  });
  var sender = p.n ? String(p.n).slice(0, 18).trim() : '';
  var curP2 = pname('p2');
  var nameWarn = !!(sender && sender !== 'Me' && curP2 !== 'Partner' && sender.toLowerCase() !== curP2.toLowerCase());
  // flag goal differences on matched activities so the pair can re-align
  var goalDiffs = [];
  if (p.a) {
    Object.keys(p.a).forEach(function (nm) {
      var id = nameMap[normName(nm)];
      if (!id) return;
      var mine = byId(id);
      var theirs = clampInt(p.a[nm][1], 1, 999999, 0);
      if (mine && theirs && theirs !== mine.goal) goalDiffs.push({ name: mine.name, theirs: theirs, mine: mine.goal });
    });
  }
  var addableNames = addable.map(function (nm) { return (p.a && p.a[nm] && p.a[nm][3]) ? String(p.a[nm][3]) : nm; });
  return { payload: p, sender: sender, days: days, entries: entries, addable: addable, addableNames: addableNames, addableEntries: addableEntries, unknown: unknown, nameWarn: nameWarn, goalDiffs: goalDiffs };
}

function commitShareCode(parsed, addMissing) {
  // Writes ONLY into the partner column (p2); person A's data is never touched.
  var p = parsed.payload;
  if (addMissing && p.a) {
    parsed.addable.forEach(function (nm) {
      var m2 = p.a[nm];
      if (!m2) return;
      db.activities.push({
        id: uid(),
        name: String(m2[3] || nm).slice(0, 24),
        emoji: String(m2[0] || '✅').slice(0, 8),
        goal: clampInt(m2[1], 1, 999999, 1),
        step: clampInt(m2[2], 1, 99999, 1)
      });
    });
    save();
  }
  var nameMap = {};
  db.activities.forEach(function (a) { nameMap[normName(a.name)] = a.id; });
  Object.keys(p.d).forEach(function (dk) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(dk)) return;
    var srcDay = p.d[dk];
    if (!srcDay || typeof srcDay !== 'object') return;
    Object.keys(srcDay).forEach(function (nm) {
      var id = nameMap[normName(nm)];
      if (!id) return;
      var n = clampInt(srcDay[nm], 0, 999999, 0);
      if (n > 0) setCount('p2', dk, id, n);
    });
  });
  // adopt the sender's name for the partner slot, unless they never set one
  if (parsed.sender && parsed.sender !== 'Me') {
    profile('p2').name = parsed.sender;
    save();
  }
}

/* ── editor actions ──────────────────────────────────────────────────── */
function saveEditor() {
  var s = view.sheet;
  syncEditorInputs();
  var name = String(s.name || '').trim();
  var goal = clampInt(s.goal, 1, 999999, 0);
  var step = clampInt(s.step, 1, 99999, 1);
  if (!name) { s.err = 'Give it a name first'; render(); focusEl('f-name', false); return; }
  if (!goal) { s.err = 'The daily goal needs a number (1 or more)'; render(); focusEl('f-goal', true); return; }
  var isNew = !s.id;
  if (s.id) {
    var a = byId(s.id);
    if (a) { a.name = name; a.emoji = s.emoji; a.goal = goal; a.step = step; }
  } else {
    db.activities.push({ id: uid(), name: name, emoji: s.emoji, goal: goal, step: step });
  }
  save();
  view.sheet = null;
  render();
  toast(isNew ? 'Quest added — go log it' : 'Saved');
}

function handleDelete() {
  var s = view.sheet;
  if (!s.confirmDelete) {
    syncEditorInputs();
    s.confirmDelete = true;
    render();
    return;
  }
  db.activities = db.activities.filter(function (a) { return a.id !== s.id; });
  db.profiles.forEach(function (p) {
    var logs = plogs(p.id);
    for (var dk in logs) {
      delete logs[dk][s.id];
      if (!Object.keys(logs[dk]).length) delete logs[dk];
    }
  });
  save();
  view.sheet = null;
  render();
  toast('Deleted');
}

function handleErase() {
  if (!view.confirmErase) {
    view.confirmErase = true;
    render();
    setTimeout(function () {
      if (view.confirmErase && view.tab === 'crew' && !view.sheet) {
        view.confirmErase = false;
        render();
      } else {
        view.confirmErase = false;
      }
    }, 4000);
    return;
  }
  try { localStorage.removeItem(KEY); } catch (e) {}
  db = seed();
  view = { tab: 'crew', date: todayKey(), cmpWeek: null, person: 'p1', sheet: null, confirmErase: false, pendingImport: null, importErr: null, syncMsg: null, pop: null };
  save();
  render();
  toast('Erased — fresh start');
}

/* ── events ──────────────────────────────────────────────────────────── */
document.addEventListener('click', function (ev) {
  var b = ev.target.closest('[data-act]');
  if (!b || b.disabled) return;
  var act = b.dataset.act, id = b.dataset.id;

  switch (act) {
    case 'tab':
      view.tab = b.dataset.tab;
      if (view.tab === 'compare') view.cmpWeek = weekStartOf(todayKey());
      view.confirmErase = false;
      view.importErr = null;
      view.syncMsg = null;
      render();
      window.scrollTo(0, 0);
      break;
    case 'person':
      view.person = id;
      render();
      break;
    case 'prev':
      view.date = addDays(view.date, -1);
      render();
      break;
    case 'next':
      if (view.date !== todayKey()) { view.date = addDays(view.date, 1); render(); }
      break;
    case 'cmp-week':
      view.cmpWeek = b.dataset.date;
      render();
      break;
    case 'rank-info':
      view.sheet = { type: 'ranks' };
      render();
      break;
    case 'arc-info':
      view.sheet = { type: 'arc' };
      render();
      break;
    case 'inc': {
      var a1 = byId(id);
      if (!a1) break;
      var was1 = isPerfect(view.person, view.date);
      var c1 = countOf(view.person, view.date, id);
      setCount(view.person, view.date, id, Math.min(999999, c1 + a1.step));
      view.pop = id;
      render();
      view.pop = null;
      if (!was1 && isPerfect(view.person, view.date)) toast('⚡ PERFECT DAY — power maxed!');
      break;
    }
    case 'dec': {
      var a2 = byId(id);
      if (!a2) break;
      var c2 = countOf(view.person, view.date, id);
      if (c2 > 0) { setCount(view.person, view.date, id, Math.max(0, c2 - a2.step)); render(); }
      break;
    }
    case 'set':
      view.sheet = { type: 'set', actId: id, err: null };
      render();
      focusEl('f-total', true);
      break;
    case 'save-total': {
      var s0 = view.sheet;
      var inp = document.getElementById('f-total');
      var n0 = clampInt(inp ? inp.value : '', 0, 999999, -1);
      if (n0 < 0) { s0.err = 'Numbers only'; render(); focusEl('f-total', true); break; }
      var was0 = isPerfect(view.person, view.date);
      setCount(view.person, view.date, s0.actId, n0);
      view.sheet = null;
      render();
      if (!was0 && isPerfect(view.person, view.date)) toast('⚡ PERFECT DAY — power maxed!');
      break;
    }
    case 'jump':
      view.date = b.dataset.date;
      if (id === 'p1' || id === 'p2') view.person = id;
      view.tab = 'today';
      render();
      window.scrollTo(0, 0);
      break;
    case 'edit': {
      var a3 = byId(id);
      if (!a3) break;
      view.sheet = { type: 'editor', id: id, name: a3.name, emoji: a3.emoji, goal: a3.goal, step: a3.step, confirmDelete: false, err: null };
      render();
      break;
    }
    case 'add':
      view.sheet = { type: 'editor', id: null, name: '', emoji: '💪', goal: 1, step: 1, confirmDelete: false, err: null };
      render();
      focusEl('f-name', false);
      break;
    case 'restore-quest': {
      var ai = -1;
      (db.archived || []).forEach(function (a, i) { if (a.id === id) ai = i; });
      if (ai < 0) break;
      var back = db.archived.splice(ai, 1)[0];
      db.activities.push(back);
      save();
      render();
      toast(back.name + ' is back in the challenge');
      break;
    }
    case 'emoji':
      syncEditorInputs();
      view.sheet.emoji = b.dataset.v;
      view.sheet.confirmDelete = false;
      render();
      break;
    case 'close-sheet':
      view.sheet = null;
      render();
      break;
    case 'save-edit':
      saveEditor();
      break;
    case 'del':
      handleDelete();
      break;
    case 'share-code':
      view.sheet = { type: 'share', code: buildShareCode() };
      render();
      break;
    case 'copy-code': {
      var codeEl = document.getElementById('f-code');
      if (!codeEl) break;
      codeEl.select();
      var copied = false;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(codeEl.value).then(function () { toast('Copied — send it to your rival'); }, function () { toast('Select the code and copy it'); });
        copied = true;
      }
      if (!copied) {
        try { document.execCommand('copy'); toast('Copied — send it to your rival'); } catch (e) { toast('Select the code and copy it'); }
      }
      break;
    }
    case 'native-share': {
      var codeEl2 = document.getElementById('f-code');
      if (codeEl2 && navigator.share) {
        navigator.share({ text: 'Health Challenge update from ' + pname('p1') + ':\n' + codeEl2.value }).catch(function () {});
      }
      break;
    }
    case 'paste-code':
      view.sheet = { type: 'paste', err: null };
      render();
      focusEl('f-paste', false);
      break;
    case 'check-code': {
      var pb = document.getElementById('f-paste');
      try {
        view.sheet = { type: 'paste', stage: 'ready', parsed: parseShareCode(pb ? pb.value : '') };
        render();
      } catch (e) {
        view.sheet.err = e.message;
        render();
        focusEl('f-paste', false);
      }
      break;
    }
    case 'commit-code': {
      var pr2 = view.sheet && view.sheet.parsed;
      if (!pr2) break;
      var addBox = document.getElementById('f-addmissing');
      var addM = !!(addBox && addBox.checked);
      commitShareCode(pr2, addM);
      view.sheet = null;
      view.syncMsg = 'Added ' + (pr2.sender || pname('p2')) + '\'s update' +
        (addM && pr2.addable.length ? ', plus ' + pr2.addable.length + ' new quest' + (pr2.addable.length === 1 ? '' : 's') : '') + '.';
      render();
      toast('Rival update added');
      break;
    }
    case 'swap-people': {
      var tn = db.profiles[0].name;
      db.profiles[0].name = db.profiles[1].name;
      db.profiles[1].name = tn;
      var tl = db.logs.p1;
      db.logs.p1 = db.logs.p2;
      db.logs.p2 = tl;
      save();
      render();
      toast('Swapped — ' + pname('p1') + ' is now the first column');
      break;
    }
    case 'export-json':
      exportJSON();
      break;
    case 'export-csv':
      exportCSV();
      break;
    case 'pick-import':
      view.importErr = null;
      document.getElementById('importFile').click();
      break;
    case 'confirm-import': {
      var p = view.pendingImport;
      if (!p) break;
      db = migrate({ version: 2, rev: p.rev, activities: p.activities, archived: p.archived, profiles: p.profiles, logs: p.logs, created: p.created });
      save();
      view.pendingImport = null;
      render();
      toast('Backup restored');
      break;
    }
    case 'cancel-import':
      view.pendingImport = null;
      render();
      break;
    case 'erase':
      handleErase();
      break;
  }
});

document.addEventListener('input', function (ev) {
  var i = ev.target;
  if (i && i.dataset && i.dataset.role === 'pname') {
    var p = profile(i.dataset.id);
    p.name = i.value.slice(0, 18);
    save(); // no re-render while typing — other views pick the name up next render
  }
});

document.getElementById('importFile').addEventListener('change', function (ev) {
  var f = ev.target.files[0];
  ev.target.value = '';
  if (!f) return;
  var reader = new FileReader();
  reader.onload = function () {
    try {
      view.pendingImport = normalizeImport(JSON.parse(String(reader.result)));
      view.importErr = null;
    } catch (e) {
      view.pendingImport = null;
      view.importErr = "That file doesn't look like a Health Challenge backup.";
    }
    render();
  };
  reader.onerror = function () {
    view.importErr = "Couldn't read that file.";
    render();
  };
  reader.readAsText(f);
});

document.addEventListener('keydown', function (ev) {
  if (ev.key === 'Escape' && view.sheet) {
    view.sheet = null;
    render();
  }
});

// day rollover: app left open past midnight
document.addEventListener('visibilitychange', function () {
  if (!document.hidden && todayKey() !== renderedToday) {
    if (view.date === renderedToday) view.date = todayKey();
    view.cmpWeek = null;
    render();
  }
});

render();
</script>
<script>
if ('serviceWorker' in navigator) {
  addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').catch(function () {});
  });
}
</script>
</body>
</html>
